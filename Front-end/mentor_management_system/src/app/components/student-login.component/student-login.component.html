<div class="page">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card" *ngIf="!successMsg">

    <div class="header">
      <div class="icon-ring">
        <i class="fa-solid fa-user-graduate"></i>
      </div>
      <h2>Student Portal</h2>
      <p>Sign in to access your details</p>
    </div>

    <form (ngSubmit)="login()" #studentForm="ngForm">

      <div class="field">
        <label>Student Email</label>
        <div class="input-wrap">
          <input type="email" placeholder="student@college.com" [(ngModel)]="loginData.email" name="email" required />
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Enter your password" [(ngModel)]="loginData.password" name="password"
            required />
        </div>
      </div>

      <button type="submit" class="btn" [disabled]="!studentForm.form.valid">
        <span>Access Portal</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="error-msg" *ngIf="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMsg }}
      </div>

    </form>

  </div>

  <div class="card success-card" *ngIf="successMsg">
    <div class="success-icon">
      <i class="fa-solid fa-check"></i>
    </div>
    <h3>Welcome back!</h3>
    <p>Redirecting to your dashboard...</p>
  </div>

</div>
