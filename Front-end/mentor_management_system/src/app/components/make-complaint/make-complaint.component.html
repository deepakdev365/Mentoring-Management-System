<div class="container mt-4">

  <h3>Send Complaint</h3>

  <div class="card p-4">

    <textarea class="form-control"
              rows="5"
              [(ngModel)]="message"
              placeholder="Write your complaint here">
    </textarea>

    <button class="btn btn-primary mt-3"
            (click)="sendComplaint()">
      Send
    </button>

  </div>

</div>
