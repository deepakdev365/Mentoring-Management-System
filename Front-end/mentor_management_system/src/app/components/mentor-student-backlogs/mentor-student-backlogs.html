<div class="container-fluid fade-in py-4 px-md-5">
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-link text-decoration-none text-muted p-0 me-3 fs-4" (click)="goBack()">
      <i class="fa-solid fa-circle-arrow-left"></i>
    </button>
    <h2 class="mb-0 text-danger fw-bold"><i class="fa-solid fa-book-skull me-2"></i>Mentee Backlogs Tracker</h2>
  </div>

  <div class="card border-0 premium-shadow rounded-4 bg-white p-4">
    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-danger" role="status"></div>
    </div>
    <div *ngIf="!isLoading && backlogs.length > 0" class="table-responsive">
      <table class="table table-borderless align-middle mb-0">
        <thead class="bg-light rounded-3">
          <tr>
            <th class="ps-3 py-3 rounded-start text-muted small text-uppercase">Student Email</th>
            <th class="py-3 text-muted small text-uppercase">Subject Code</th>
            <th class="py-3 text-muted small text-uppercase">Subject Name</th>
            <th class="py-3 rounded-end text-muted small text-uppercase text-center">Semester / Attempt</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let bl of backlogs" class="border-bottom">
            <td class="ps-3 py-3 fw-semibold">{{ bl.email }}</td>
            <td class="py-3 font-monospace">{{ bl.subjectCode }}</td>
            <td class="py-3">{{ bl.subjectName }}</td>
            <td class="py-3 text-center">
              <span class="badge bg-secondary-soft text-secondary rounded-pill px-3">{{ bl.semester }} / {{ bl.attemptCount }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="!isLoading && backlogs.length === 0" class="text-center py-5">
      <i class="fa-solid fa-circle-check fs-1 text-success mb-2 d-block"></i>
      <p class="text-muted fs-5 mb-0 mt-3">No active backlogs detected among your assigned students.</p>
    </div>
  </div>
</div>
