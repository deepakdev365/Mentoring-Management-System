<div class="page">

  <!-- Animated background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card" *ngIf="!successMsg">

    <!-- Icon + Title -->
    <div class="header">
      <div class="icon-ring">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h2>Administrator</h2>
      <p>Sign in to manage your institution</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="login()" #adminForm="ngForm">

      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <!-- <i class="fa-solid fa-envelope"></i> -->
          <input type="email" placeholder="admin@college.com" [(ngModel)]="loginData.email" name="email" required />
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <!-- <i class="fa-solid fa-lock"></i> -->
          <input type="password" placeholder="Enter your password" [(ngModel)]="loginData.password" name="password"
            required />
        </div>
      </div>

      <button type="submit" class="btn" [disabled]="!adminForm.form.valid">
        <span>Sign In</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <div class="error-msg" *ngIf="errorMsg">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMsg }}
      </div>

    </form>

  </div>

  <!-- Success state -->
  <div class="card success-card" *ngIf="successMsg">
    <div class="success-icon">
      <i class="fa-solid fa-check"></i>
    </div>
    <h3>Welcome back!</h3>
    <p>Redirecting to dashboard...</p>
  </div>

</div>
