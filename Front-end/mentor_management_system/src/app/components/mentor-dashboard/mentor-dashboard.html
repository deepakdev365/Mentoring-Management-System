<div class="container mt-4">

  <h2 class="mb-4">Mentor Dashboard</h2>

  <div class="row">

    <!-- Total Students -->
    <div class="col-md-4">
      <div class="card text-center p-3 shadow">
        <h5>Total Students</h5>
        <h2>{{totalStudents}}</h2>
      </div>
    </div>

    <!-- Total Complaints -->
    <div class="col-md-4">
      <div class="card text-center p-3 shadow">
        <h5>Total Complaints</h5>
        <h2>{{totalComplaints}}</h2>
      </div>
    </div>

    <!-- Pending Complaints -->
    <div class="col-md-4">
      <div class="card text-center p-3 shadow">
        <h5>Pending Complaints</h5>
        <h2 class="text-danger">{{pendingComplaints}}</h2>
      </div>
    </div>

  </div>

</div>
