<h2>Profile</h2>

<div *ngIf="mentor; else noData">

  <p><strong>Name:</strong> {{ mentor.fullName }}</p>
  <p><strong>Email:</strong> {{ mentor.email }}</p>
  <p><strong>Phone:</strong> {{ mentor.phoneNo }}</p>  <!-- ✅ FIX -->
  <p><strong>Department:</strong> {{ mentor.department }}</p>
  <p><strong>City:</strong> {{ mentor.city }}</p>

</div>

<ng-template #noData>
  <p>No profile data found</p>
</ng-template>
