<div class="container mt-4">

  <h3>Make Announcement</h3>

  <textarea [(ngModel)]="message"
            class="form-control mb-3"
            rows="5"
            placeholder="Enter announcement...">
  </textarea>

  <button class="btn btn-primary" (click)="send()">Announce</button>

  <p class="mt-3 text-success">{{response}}</p>

</div>
