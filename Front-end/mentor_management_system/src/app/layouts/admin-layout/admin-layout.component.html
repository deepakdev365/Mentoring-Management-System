<!-- Header Layout -->
<nav class="header px-4">
  <div class="header-left">
    <span class="badge me-2">AD</span>
    <span class="brand fw-bold">Mentoring System Admin</span>
  </div>

  <div class="header-right">
    <div class="user-meta d-none d-md-block text-end">
      <span class="text-small opacity-75 d-block">System Administrator,</span>
      <span class="user-name fw-bold">{{admin.fullName}}</span>
    </div>
    <div class="avatar flex-center">
      {{admin.initials || 'AD'}}
    </div>
    <button class="btn-logout ms-2" (click)="logout()">
      <i class="fa-solid fa-right-from-bracket"></i> Logout
    </button>
  </div>
</nav>

<div class="layout">

  <!-- Sidebar (Expand on Hover) -->
  <aside class="sidebar fade-in">
    <div class="menu">
      <div class="label px-4 py-3">
        <i class="fa-solid fa-bars sidebar-fa-icon" alt="Nav"></i>
        <span class="label-text">Administration</span>
      </div>

      <ul class="nav-list mt-2">
        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active">
            <i class="fa-solid fa-house"></i>
            <span class="nav-label">Overview</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/students" routerLinkActive="active">
            <i class="fa-solid fa-users"></i>
            <span class="nav-label">Students</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/mentor" routerLinkActive="active">
            <i class="fa-solid fa-chalkboard-user"></i>
            <span class="nav-label">Faculty</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/assign-mentees" routerLinkActive="active">
            <i class="fa-solid fa-user-plus"></i>
            <span class="nav-label">Mentees Allocation</span>
          </a>
        </li>

        <!-- <li class="menu-separator"></li>
        <li class="label px-4 py-2">
          <span class="label-text text-uppercase x-small opacity-50">Data Import</span>
        </li> -->

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/upload-marks" routerLinkActive="active">
            <i class="fa-solid fa-file-excel"></i>
            <span class="nav-label">Academic Data</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/upload-payments" routerLinkActive="active">
            <i class="fa-solid fa-credit-card"></i>
            <span class="nav-label">Financials</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/upload-attendance" routerLinkActive="active">
            <i class="fa-solid fa-calendar-check"></i>
            <span class="nav-label">Attendance</span>
          </a>
        </li>

        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/upload-subject-registration" routerLinkActive="active">
            <i class="fa-solid fa-clipboard-list"></i>
            <span class="nav-label">Registration</span>
          </a>
        </li>

        <li class="menu-separator"></li>
        <li class="nav-wrapper">
          <a class="nav-item" routerLink="/admin/make-announcement" routerLinkActive="active">
            <i class="fa-solid fa-bullhorn"></i>
            <span class="nav-label">Broadcasts</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>

  <!-- Main View Area -->
  <main class="content">
    <div class="viewport fade-in">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
